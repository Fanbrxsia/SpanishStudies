<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>XP Board Music Player</title>
<style>
  html,body{margin:0;padding:0;height:100%;background:#1a1a2e;overflow:hidden}
  #wrap{width:100%;height:100%}
  iframe{width:100%;height:100%;border:none;display:block}
  #msg{color:#fff;font-family:sans-serif;text-align:center;padding:40px 20px;font-size:14px}
</style>
</head>
<body>
<div id="wrap"></div>
<script src="https://www.youtube.com/iframe_api"></script>
<script>
  // Reads ?v=VIDEO_ID from the URL and embeds that YouTube video.
  // Usage: player.html?v=dQw4w9WgXcQ
  //
  // The player instance persists across track changes - to switch tracks,
  // the parent should postMessage {cmd:'loadVideo', id:'NEW_VIDEO_ID'} rather
  // than reloading this iframe's src (reloading breaks the IFrame API handshake
  // on repeated loads in some browsers).
  //
  // Remote control via postMessage from the parent page:
  //   {cmd:'play'}, {cmd:'pause'}, {cmd:'toggle'}, {cmd:'seek', value:0-1},
  //   {cmd:'loop'}, {cmd:'loadVideo', id:'VIDEO_ID'}
  // State reports back via postMessage:
  //   {type:'xpb-player', state:'playing'|'paused'|'ended'|'tick', duration, currentTime, title}

  const params = new URLSearchParams(window.location.search);
  const initialId = params.get('v');
  const wrap = document.getElementById('wrap');
  let player = null;
  let reportTimer = null;

  if (!initialId || !/^[a-zA-Z0-9_-]{11}$/.test(initialId)) {
    wrap.innerHTML = '<div id="msg">No video specified.<br>Use <code>?v=VIDEO_ID</code> in the URL.</div>';
  } else {
    const target = document.createElement('div');
    target.id = 'yt-target';
    wrap.appendChild(target);

    window.onYouTubeIframeAPIReady = function() {
      player = new YT.Player('yt-target', {
        videoId: initialId,
        playerVars: { autoplay: 1, playsinline: 1 },
        events: {
          onReady: onPlayerReady,
          onStateChange: onPlayerStateChange
        }
      });
    };

    function onPlayerReady(event) {
      event.target.playVideo();
      startReporting();
    }

    function onPlayerStateChange(event) {
      let state = 'unknown';
      if (event.data === YT.PlayerState.PLAYING) state = 'playing';
      else if (event.data === YT.PlayerState.PAUSED) state = 'paused';
      else if (event.data === YT.PlayerState.ENDED) state = 'ended';
      reportState(state);
    }

    function reportState(state) {
      if (!player || typeof player.getCurrentTime !== 'function') return;
      try {
        window.parent.postMessage({
          type: 'xpb-player',
          state: state,
          duration: player.getDuration(),
          currentTime: player.getCurrentTime(),
          title: (typeof player.getVideoData === 'function') ? player.getVideoData().title : ''
        }, '*');
      } catch (e) {}
    }

    function startReporting() {
      clearInterval(reportTimer);
      reportTimer = setInterval(() => reportState('tick'), 1000);
    }

    window.addEventListener('message', function(e) {
      if (!player || !e.data || !e.data.cmd) return;
      switch (e.data.cmd) {
        case 'play': player.playVideo(); break;
        case 'pause': player.pauseVideo(); break;
        case 'toggle':
          const s = player.getPlayerState();
          if (s === YT.PlayerState.PLAYING) player.pauseVideo();
          else player.playVideo();
          break;
        case 'seek':
          if (typeof e.data.value === 'number') {
            player.seekTo(player.getDuration() * e.data.value, true);
          }
          break;
        case 'loop':
          player.seekTo(0, true);
          player.playVideo();
          break;
        case 'loadVideo':
          if (e.data.id && /^[a-zA-Z0-9_-]{11}$/.test(e.data.id)) {
            player.loadVideoById(e.data.id);
          }
          break;
      }
    });
  }
</script>
</body>
</html>
